name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-randr0-dev \
            libxkbcommon-dev libwayland-dev

      - name: Clippy (CLI)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (GUI)
        run: cargo clippy --features gui --bin snuff -- -D warnings

      - name: Build CLI
        run: cargo build --release

      - name: Build GUI
        run: cargo build --release --features gui

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: sniffer-${{ matrix.os }}
          path: target/release/sniffer${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload GUI binary
        uses: actions/upload-artifact@v4
        with:
          name: snuff-${{ matrix.os }}
          path: target/release/snuff${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    if: github.event_name == 'release'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv sniffer-ubuntu-latest/sniffer         sniffer-linux-x64
          mv sniffer-windows-latest/sniffer.exe    sniffer-windows-x64.exe
          mv snuff-ubuntu-latest/snuff             snuff-linux-x64
          mv snuff-windows-latest/snuff.exe        snuff-windows-x64.exe
          gh release upload "${{ github.event.release.tag_name }}" \
            sniffer-linux-x64 sniffer-windows-x64.exe \
            snuff-linux-x64 snuff-windows-x64.exe --clobber
